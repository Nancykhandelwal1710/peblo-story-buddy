name: peblo_story_buddy
description: "Interactive AI story buddy and quiz component for Peblo challenge."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.5
  confetti: ^0.8.0
  provider: ^6.1.5+1
  flutter_animate: ^4.5.2
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/pip_robot.png
    